name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # 🧪 Quality Assurance Pipeline
  quality-gate:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 18.x
            os: ubuntu-latest
          - node-version: 20.x
            os: ubuntu-latest
          - node-version: 22.x
            os: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: 🔧 Install Dependencies
        run: npm ci --ignore-scripts

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🧹 Lint Code
        run: npm run lint

      - name: 🧪 Run Tests
        run: npm test
        env:
          CI: true

      - name: 🧪 Run Tests with Coverage
        if: matrix.node-version == '20.x' && matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
        env:
          CI: true

      - name: 📊 Upload Coverage
        if: matrix.node-version == '20.x' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # 🔒 Security Audit
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: 🔍 NPM Audit
        run: npm audit --audit-level=moderate || true

      - name: 🛡️ Check for Known Vulnerabilities
        run: |
          echo "Running security checks..."
          npm audit --json > audit-results.json || true
          if [ -s audit-results.json ]; then
            echo "Audit results saved"
          fi

  # 📝 Semantic Release Preparation (Optional - requires NPM_TOKEN secret)
  release-check:
    name: 📝 Release Check
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true
    outputs:
      new-release-published: ${{ steps.semantic-release.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic-release.outputs.new-release-version }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: 🔧 Install Dependencies
        run: npm ci --ignore-scripts

      - name: 📝 Semantic Release (Dry Run)
        id: semantic-release
        if: ${{ secrets.NPM_TOKEN != '' }}
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          semantic_version: 21.0.7
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: ⚠️ Skip Release Check
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN not configured, skipping release check"
